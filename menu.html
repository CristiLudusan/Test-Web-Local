// 🔥 PARSER FIX (NU mai depinde de categorii hardcodate)
function parseMenu(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(l => l);
    const menu = {};

    let currentCategory = null;
    let currentSub = null;

    lines.forEach(line => {

        // linie fără // = categorie sau subcategorie
        if (!line.includes("//")) {

            // SUBCATEGORIE = ALL CAPS
            if (line === line.toUpperCase() && currentCategory) {
                currentSub = line;
                menu[currentCategory].subcategories[currentSub] = [];
                return;
            }

            // CATEGORIE
            currentCategory = line.toLowerCase();
            menu[currentCategory] = {
                title: line,
                items: [],
                subcategories: {}
            };
            currentSub = null;
            return;
        }

        // ITEM
        const parts = line.split("//").map(p => p.trim());

        const item = {
            name: parts[0],
            details: parts.slice(1, -1).join(" // "),
            price: parts[parts.length - 1]
        };

        if (currentSub) {
            menu[currentCategory].subcategories[currentSub].push(item);
        } else {
            menu[currentCategory].items.push(item);
        }

    });

    return menu;
}

const menuData = parseMenu(rawMenu);
const categories = Object.keys(menuData);
let currentIndex = 0;


// 🔘 BUTOANE (NU afectează celelalte butoane)
const buttonsDiv = document.getElementById("menu-buttons");

buttonsDiv.innerHTML = ""; // reset

categories.forEach((cat) => {
    const btn = document.createElement("button");
    btn.innerText = menuData[cat].title;
    btn.onclick = () => showMenu(cat);
    buttonsDiv.appendChild(btn);
});


// 🔥 AFIȘARE
function showMenu(category) {
    const container = document.getElementById("menu-container");

    // fade OUT
    container.classList.remove("menu-animate", "show");

    setTimeout(() => {

        container.innerHTML = "";

        currentIndex = categories.indexOf(category);

        const btns = document.querySelectorAll("#menu-buttons button");
        btns.forEach(b => b.classList.remove("active-btn"));
        if (btns[currentIndex]) {
            btns[currentIndex].classList.add("active-btn");
        }

        const data = menuData[category];

        const title = document.createElement("div");
        title.classList.add("category-title");
        title.innerText = data.title;
        container.appendChild(title);

        // items simple
        data.items.forEach((item, i) => {
            const el = createItem(item);
            el.style.animationDelay = `${i * 0.05}s`; // 🔥 stagger effect
            container.appendChild(el);
        });

        // subcategorii
        for (let sub in data.subcategories) {
            const subTitle = document.createElement("div");
            subTitle.classList.add("subcategory");
            subTitle.innerText = sub;
            container.appendChild(subTitle);

            data.subcategories[sub].forEach((item, i) => {
                const el = createItem(item);
                el.style.animationDelay = `${i * 0.05}s`;
                container.appendChild(el);
            });
        }

        // trigger fade IN
        container.classList.add("menu-animate");

        setTimeout(() => {
            container.classList.add("show");
        }, 50);

    }, 200); // durata fade OUT
}


// 🔧 ITEM UI
function createItem(item) {
    const div = document.createElement("div");
    div.classList.add("item");

    div.innerHTML = `
        <div>
            <strong>${item.name}</strong><br>
            ${item.details}
        </div>
        <div>${item.price}</div>
    `;

    return div;
}
