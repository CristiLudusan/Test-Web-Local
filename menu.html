function parseMenu(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(l => l);
    const menu = {};

    let currentCategory = null;
    let currentSub = null;

    lines.forEach(line => {

        // linie fără // = categorie sau subcategorie
        if (!line.includes("//")) {

            // SUBCATEGORIE = ALL CAPS
            if (line === line.toUpperCase() && currentCategory) {
                currentSub = line;
                menu[currentCategory].subcategories[currentSub] = [];
                return;
            }

            // CATEGORIE
            currentCategory = line.toLowerCase();
            menu[currentCategory] = {
                title: line,
                items: [],
                subcategories: {}
            };
            currentSub = null;
            return;
        }

        // ITEM
        const parts = line.split("//").map(p => p.trim());

        const item = {
            name: parts[0],
            details: parts.slice(1, -1).join(" // "),
            price: parts[parts.length - 1]
        };

        if (currentSub) {
            menu[currentCategory].subcategories[currentSub].push(item);
        } else {
            menu[currentCategory].items.push(item);
        }

    });

    return menu;
}

const menuData = parseMenu(rawMenu);
const categories = Object.keys(menuData);
let currentIndex = 0;


const buttonsDiv = document.getElementById("buttons");

buttonsDiv.innerHTML = ""; // reset

categories.forEach((cat) => {
    const btn = document.createElement("button");
    btn.innerText = menuData[cat].title;
    btn.onclick = () => showMenu(cat);
    buttonsDiv.appendChild(btn);
});


function showMenu(category) {
    const container = document.getElementById("menu-container");
    container.innerHTML = "";

    currentIndex = categories.indexOf(category);

    document.querySelectorAll("#buttons button").forEach(b => b.classList.remove("active-btn"));
    document.querySelectorAll("#buttons button")[currentIndex].classList.add("active-btn");

    const data = menuData[category];

    const title = document.createElement("div");
    title.classList.add("category-title");
    title.innerText = data.title;
    container.appendChild(title);

    // items simple
    data.items.forEach(item => {
        container.appendChild(createItem(item));
    });

    // subcategorii
    for (let sub in data.subcategories) {
        const subTitle = document.createElement("div");
        subTitle.classList.add("subcategory");
        subTitle.innerText = sub;
        container.appendChild(subTitle);

        data.subcategories[sub].forEach(item => {
            container.appendChild(createItem(item));
        });
    }
}


function createItem(item) {
    const div = document.createElement("div");
    div.classList.add("item");

    div.innerHTML = `
        <div>
            <strong>${item.name}</strong><br>
            ${item.details}
        </div>
        <div>${item.price}</div>
    `;

    return div;
}
